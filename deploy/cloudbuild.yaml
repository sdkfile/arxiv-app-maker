steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/arxiv-pipeline", "-f", "deploy/Dockerfile", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/arxiv-pipeline"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "jobs"
      - "update"
      - "arxiv-pipeline"
      - "--image"
      - "gcr.io/$PROJECT_ID/arxiv-pipeline"
      - "--region"
      - "${_REGION}"

substitutions:
  _REGION: asia-northeast3

images:
  - "gcr.io/$PROJECT_ID/arxiv-pipeline"
